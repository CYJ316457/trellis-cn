# Trellis Configuration
# Project-level settings for the Trellis workflow system
#
# All values have sensible defaults. Only override what you need.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

# Commit message used when auto-committing journal/index changes
# after running add_session.py
session_commit_message: "chore: record journal"

# Maximum lines per journal file before rotating to a new one
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# Session Auto-Commit
#-------------------------------------------------------------------------------

# Auto-commit behavior for session journal + task archive operations.
# - true (default): scripts auto-stage and auto-commit journal / task changes
#   after add_session.py / task.py archive runs.
# - false: scripts do not touch git. Files (journal-*.md, task archive moves)
#   are still written to disk; you decide whether to git add / commit.
#
# Use `false` if your project's .gitignore intentionally excludes `.trellis/`
# and you want session data kept local-only, or if you prefer to review
# staged changes manually before each commit.
#
# Accepts: true / false / yes / no / 1 / 0 / on / off (case-insensitive).
#
# session_auto_commit: true

#-------------------------------------------------------------------------------
# Finish Work Checklist Validation
#-------------------------------------------------------------------------------

# When true, task.py archive runs a pre-archive readiness gate before moving
# the task into archive/. Default false keeps the current behavior unchanged.
#
# The gate checks:
# - task.json exists and is no longer planning
# - prd.md exists
# - implement.jsonl / check.jsonl are curated when the project uses
#   sub-agent-capable platform templates
#
# finish_work_checklist_validation: false

#-------------------------------------------------------------------------------
# Brainstorm External Model (opt-in, safe fallback)
#-------------------------------------------------------------------------------

# Optional external brainstorm model. Default disabled keeps the existing
# workflow unchanged: brainstorming stays in the current AI session.
#
# When enabled, Trellis may invoke `.trellis/scripts/brainstorm_runner.py`
# before the normal brainstorm Q&A loop. If config is incomplete or the
# external provider fails, the workflow MUST fall back to native brainstorm.
#
# API key: use api_key (explicit) or api_key_env (env var name).
# At least one must be set when mode is external.
# WARNING: config.yaml is git-tracked; prefer api_key_env for shared repos.
#
# brainstorm:
#   enabled: false
#   mode: native          # native | external
#   provider: deepseek
#   base_url: https://api.deepseek.com/v1
#   model: deepseek-chat
#   api_key: sk-xxx                   # explicit key (prefer api_key_env for security)
#   # api_key_env: DEEPSEEK_API_KEY   # env var name (fallback if api_key is empty)
#   timeout_seconds: 60

#-------------------------------------------------------------------------------
# Planning Enhancement (opt-in, safe fallback)
#-------------------------------------------------------------------------------

# Optional enhanced Phase1 planning helper. Default disabled keeps the old
# brainstorm / research / jsonl workflow unchanged.
#
# When enabled, Trellis may invoke `.trellis/scripts/planning_runner.py` to
# draft full `prd.md`, `implement.jsonl`, and `check.jsonl` contents. Missing
# config, invalid model output, timeout, or provider failure MUST fall back to
# the original planning flow.
#
# API key: use api_key (explicit) or api_key_env (env var name).
# WARNING: config.yaml is git-tracked; prefer api_key_env for shared repos.
#
# planning:
# enhanced: false
# model_profile: strong
# provider: deepseek
# base_url: https://api.deepseek.com/v1
# model: deepseek-chat
# api_key: sk-xxx # explicit key (prefer api_key_env for security)
# # api_key_env: DEEPSEEK_API_KEY # env var name (fallback if api_key is empty)
# reasoning_effort: high
# timeout_seconds:120
# retry_count:1

#-------------------------------------------------------------------------------
# Quality Check Enhancement (opt-in, safe fallback)
#-------------------------------------------------------------------------------

# Optional enhanced Phase2.2 / Phase3.1 quality-check helper. Default disabled
# keeps the original `trellis-check` workflow unchanged.
#
# When enabled, Trellis may route Phase 2.2 / 3.1 with stronger model intent.
# Unsupported overrides, incomplete config, or runtime failures MUST fall back
# to the original native `trellis-check` path.
#
# API key: use api_key (explicit) or api_key_env (env var name).
# WARNING: config.yaml is git-tracked; prefer api_key_env for shared repos.
#
# check:
#   enhanced: false
#   model_profile: strong
#   provider: deepseek
#   base_url: https://api.deepseek.com/v1
#   model: deepseek-chat
#   api_key: sk-xxx                   # explicit key (prefer api_key_env for security)
#   # api_key_env: DEEPSEEK_API_KEY   # env var name (fallback if api_key is empty)
#   reasoning_effort: high
#   timeout_seconds: 120
#   retry_count: 1

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

# Shell commands to run after task lifecycle events.
# Each hook receives TASK_JSON_PATH environment variable pointing to task.json.
# Hook failures print a warning but do not block the main operation.
#
# hooks:
#   after_create:
#     - "echo 'Task created'"
#   after_start:
#     - "echo 'Task started'"
#   after_finish:
#     - "echo 'Task finished'"
#   after_archive:
#     - "echo 'Task archived'"
hooks:
  after_archive:
    - "python3 .trellis/scripts/hooks/archive_summary.py"

#-------------------------------------------------------------------------------
# Monorepo / Packages
#-------------------------------------------------------------------------------

# Declare packages for monorepo projects.
# Trellis auto-detects workspaces during `trellis init`, but you can also
# configure them manually here.
#
# packages:
#   frontend:
#     path: packages/frontend
#   backend:
#     path: packages/backend
#   docs:
#     path: docs-site
#     type: submodule
#   # For polyrepo / meta-repo layouts (independent .git in each subdir),
#   # mark the package with `git: true`. The runtime treats it as an
#   # independent repository for things like git-context display.
#   webapp:
#     path: ./webapp
#     git: true

# Default package used when --package is not specified.
# default_package: frontend

#-------------------------------------------------------------------------------
# Codex (dispatch behavior)
#-------------------------------------------------------------------------------
# Codex-only knob; other platforms ignore it. Default ("inline") makes the
# main Codex agent edit code directly because Codex sub-agents run with
# `fork_turns="none"` isolation and can't inherit the parent session's
# task context. Set to "sub-agent" to opt into the legacy dispatch model
# (main agent spawns trellis-implement / trellis-check / trellis-research
# sub-agents).
#
# codex:
#   dispatch_mode: inline  # or "sub-agent" to dispatch trellis-* sub-agents
